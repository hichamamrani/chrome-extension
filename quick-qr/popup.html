<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick QR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app" id="app">

    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <div class="brand-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></svg>
        </div>
        <h1 class="brand-title">Quick QR</h1>
      </div>
      <button class="icon-btn theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle light/dark mode">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </button>
    </header>

    <!-- Page Info Card -->
    <section class="card page-info">
      <div class="page-meta">
        <img class="favicon" id="favicon" src="" alt="" width="32" height="32">
        <div class="page-text">
          <h2 class="page-title" id="pageTitle">Loading…</h2>
          <p class="page-url" id="pageUrl">—</p>
        </div>
      </div>
    </section>

    <!-- QR Code Card -->
    <section class="card qr-card">
      <div class="qr-wrapper" id="qrWrapper">
        <canvas id="qrCanvas" aria-label="QR code"></canvas>
        <div class="qr-loading" id="qrLoading">
          <div class="spinner"></div>
          <span>Generating QR…</span>
        </div>
      </div>
    </section>

    <!-- Action Buttons -->
    <section class="actions">
      <button class="action-btn" id="copyUrlBtn" title="Copy URL">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
        <span>Copy URL</span>
      </button>
      <button class="action-btn" id="downloadBtn" title="Download QR as PNG">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        <span>Download</span>
      </button>
      <button class="action-btn" id="openSiteBtn" title="Open website">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
        <span>Open Site</span>
      </button>
      <button class="action-btn" id="refreshBtn" title="Refresh QR">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
        <span>Refresh</span>
      </button>
    </section>

    <!-- Options Panel -->
    <section class="card options-card">
      <button class="options-toggle" id="optionsToggle" aria-expanded="false">
        <div class="options-toggle-left">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="4" y1="21" y2="14"/><line x1="4" x2="4" y1="10" y2="3"/><line x1="12" x2="12" y1="21" y2="12"/><line x1="12" x2="12" y1="8" y2="3"/><line x1="20" x2="20" y1="21" y2="16"/><line x1="20" x2="20" y1="12" y2="3"/><line x1="2" x2="6" y1="14" y2="14"/><line x1="10" x2="14" y1="8" y2="8"/><line x1="18" x2="22" y1="16" y2="16"/></svg>
          <span>Options</span>
        </div>
        <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>

      <div class="options-panel" id="optionsPanel">
        <!-- QR Size -->
        <div class="option-row">
          <label for="sizeSlider">QR Size</label>
          <div class="option-control">
            <input type="range" id="sizeSlider" min="128" max="512" step="16" value="256">
            <span class="option-value" id="sizeValue">256px</span>
          </div>
        </div>

        <!-- Margin -->
        <div class="option-row">
          <label for="marginSlider">Margin</label>
          <div class="option-control">
            <input type="range" id="marginSlider" min="0" max="8" step="1" value="2">
            <span class="option-value" id="marginValue">2</span>
          </div>
        </div>

        <!-- Foreground Color -->
        <div class="option-row">
          <label for="fgColor">Foreground</label>
          <div class="option-control color-control">
            <input type="color" id="fgColor" value="#000000">
            <span class="color-hex" id="fgHex">#000000</span>
          </div>
        </div>

        <!-- Background Color -->
        <div class="option-row">
          <label for="bgColor">Background</label>
          <div class="option-control color-control">
            <input type="color" id="bgColor" value="#ffffff">
            <span class="color-hex" id="bgHex">#ffffff</span>
          </div>
        </div>

        <!-- Preset: Black/White -->
        <div class="option-row presets">
          <label>Presets</label>
          <div class="preset-btns">
            <button class="preset-btn active" id="presetBW" data-fg="#000000" data-bg="#ffffff">Black / White</button>
            <button class="preset-btn" id="presetBrand" data-fg="#2563eb" data-bg="#ffffff">Brand Blue</button>
            <button class="preset-btn" id="presetInverted" data-fg="#ffffff" data-bg="#000000">Inverted</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Algobots branding footer -->
    <footer class="footer-brand">
      Made by
      <a href="https://algobots.co.uk" target="_blank" rel="noopener noreferrer" id="algobotsLink">Algobots</a>
    </footer>

    <!-- Toast notification -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </div>

  <script src="lib/qrcode.bundle.js"></script>
  <script src="popup.js"></script>
</body>
</html>
